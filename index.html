<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Comprador Inteligente: Compare preços, analise qualidade e evite burlas com IA.">
    <title>Comprador Inteligente - Compare Preços com IA</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<!-- AUTH -->
<div id="auth-screen" class="auth-wrapper">

    <div class="auth-container">

        <div class="auth-brand">
            <div class="logo-badge">🛒</div>
            <h1>Comprador Inteligente</h1>
            <p>Encontre as melhores ofertas</p>
        </div>

        <!-- LOGIN -->
        <form id="login-form" class="auth-form active">
            <h2>Login</h2>

            <div class="form-group">
                <label>Email</label>
                <input id="login-email" type="email">
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input id="login-password" type="password">
            </div>

            <button type="submit" class="btn btn-primary btn-lg">
                <span>Entrar</span>
            </button>

            <button type="button" class="switch-link" data-target="signup">Criar conta</button>
        </form>

        <!-- SIGNUP -->
        <form id="signup-form" class="auth-form">
            <h2>Criar Conta</h2>

            <div class="form-group">
                <label>Nome</label>
                <input id="signup-name" type="text">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input id="signup-email" type="email">
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input id="signup-password" type="password">
            </div>

            <div class="form-group">
                <label>Confirmar Senha</label>
                <input id="signup-confirm" type="password">
            </div>

            <button type="submit" class="btn btn-primary btn-lg">
                <span>Criar conta</span>
            </button>

            <button type="button" class="switch-link" data-target="login">Voltar</button>
        </form>

    </div>
</div>

<!-- SEARCH -->
<div id="search-screen" class="screen hidden">

    <nav class="navbar">
        <h2>Comprador Inteligente</h2>
        <button id="logout-btn" class="btn-logout">Sair</button>
    </nav>

    <main class="main-content">

        <div class="search-box">
            <input id="search-input" placeholder="Pesquisar produtos...">
            <button id="search-btn" class="btn btn-primary">
                <span>Buscar</span>
            </button>
        </div>

        <div id="results" class="results-container hidden">
            <div id="products-list"></div>
        </div>

    </main>

</div>

<script src="script.js"></script>
</body>
  </html>
